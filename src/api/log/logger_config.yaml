version: 1
disable_existing_loggers: false

formatters:
  json:
    format: "%(asctime)s %(name)s %(levelname)s  %(message)s %(filename)s:%(lineno)d"
    class: pythonjsonlogger.jsonlogger.JsonFormatter
  normal:
    format: "%(asctime)s %(name)s %(levelname)s  %(message)s %(filename)s:%(lineno)d"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: normal
    stream: ext://sys.stdout

loggers:
  backend:
    level: INFO
    handlers: [console]
    propagate: false

  # gunicorn.error:
  #   level: DEBUG
  #   handlers: [console]
  #   propagate: false

  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: false

  sqlalchemy.engine:
    level: ERROR
    handlers: [console]
    propagate: false

  alembic.runtime.migration:
    level: INFO
    handlers: [console]
    propagate: false

  azure.core.pipeline.policies.http_logging_policy:
    level: WARNING
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console]
